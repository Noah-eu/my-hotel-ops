[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["xlsx"]

[[redirects]]
  from = "/api/previo-import-email"
  to = "/.netlify/functions/previo-import-email"
  status = 200

[[redirects]]
  from = "/api/previo-import-preview"
  to = "/.netlify/functions/previo-import-preview"
  status = 200

[[redirects]]
  from = "/api/previo-import-cleanup"
  to = "/.netlify/functions/previo-import-cleanup"
  status = 200
